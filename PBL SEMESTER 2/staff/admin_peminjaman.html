<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Laporan Peminjaman</title>
    <link rel="stylesheet" href="admin_style.css">
</head>
<body>
    <div class="sidebar">
        <div class="profile-section">
            <div class="profile-icon">👤</div>
            <div id="namaAdminTampil" style="font-weight: bold; font-size: 18px; text-transform: uppercase;">PERSON</div>
            <div class="role-badge">Administrator</div>
        </div>
        <ul class="menu">
            <a href="admin_dashboard.html">📊 Dashboard</a>
            <a href="admin_buku.html">📖 Kelola Data</a>
            <a href="admin_anggota.html">👥 Log Data</a>
            <a href="admin_peminjaman.html" class="active">📄 Laporan</a>
        </ul>
        <a href="#" onclick="prosesLogout()" class="logout">🚪 Log Out</a>
    </div>

    <div class="main-wrapper">
        <div class="top-navbar">☰</div>
        <div class="content-area">
            <div class="card-box">
                
                <div id="viewTabel">
                    <h2 class="page-title">DATA PEMINJAMAN</h2>
                    <div class="header-actions">
                        <button class="btn-tambah" onclick="tambahData()">+ Tambah Data</button>
                        
                        <div style="position: relative; display: flex; align-items: center; gap: 10px;">
                            <span style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 18px; pointer-events: none; z-index: 2;">🔍</span>
                            
                            <input type="text" id="kolomCariPinjam" class="search-box" style="padding-left: 45px; width: 280px; height: 40px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: 'Poppins', sans-serif;" placeholder="Search ID, Peminjam, Buku..." onkeyup="handlePencarianPinjam()" autocomplete="off">
                            
                            <button class="btn-search" style="background-color: #1A1152; color: white; border: none; padding: 0 25px; height: 40px; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; transition: 0.3s;" onclick="handlePencarianPinjam()">
                                Search
                            </button>
                            
                            <div id="rekomendasiPinjam" style="display: none; position: absolute; top: 100%; left: 0; width: 280px; background: white; border: 1px solid #ccc; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.15); z-index: 999; max-height: 200px; overflow-y: auto; margin-top: 5px;">
                            </div>
                        </div>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>NO</th>
                                <th>ID PEMINJAMAN</th>
                                <th>JUDUL BUKU</th>
                                <th>PEMINJAM</th>
                                <th>TANGGAL PEMINJAMAN</th>
                                <th>JATUH TEMPO</th>
                                <th>KELOLA</th>
                            </tr>
                        </thead>
                        <tbody id="tabelPinjamBody">
                            </tbody>
                    </table>
                </div>

                <div id="viewForm" style="display: none;">
                    <h2 class="page-title" id="formTitle">TAMBAH PEMINJAMAN</h2>
                    <div class="form-group"><label>ID PEMINJAMAN</label><input type="text" id="inIdPinjam"></div>
                    <div class="form-group"><label>JUDUL BUKU</label><input type="text" id="inJudulBuku"></div>
                    <div class="form-group"><label>PEMINJAM</label><input type="text" id="inPeminjam"></div>
                    <div class="form-group"><label>TANGGAL PEMINJAMAN</label><input type="date" id="inTgl"></div>
                    <div class="form-group"><label>JATUH TEMPO</label><input type="date" id="inJatuhTempo"></div>
                    
                    <div style="margin-top: 30px;">
                        <button class="btn-simpan" onclick="simpanData()">SIMPAN</button>
                        <button class="btn-batal" onclick="toggleView('viewTabel')">BATAL</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
    
    <script>
        let isEditMode = false;
        const API_URL = 'http://127.0.0.1:5000/api/peminjaman';
        let dataPinjamLokal = []; // Ditambahkan: Menyimpan salinan data dari database untuk pencarian

        window.onload = function() { 
            loadDataPeminjaman(); 
        };

        // Menutup kotak rekomendasi otomatis jika klik di luar search bar
        document.addEventListener("click", function(e) {
            if (e.target.id !== "kolomCariPinjam") {
                document.getElementById("rekomendasiPinjam").style.display = "none";
            }
        });

        function toggleView(viewId) {
            document.getElementById('viewTabel').style.display = 'none';
            document.getElementById('viewForm').style.display = 'none';
            document.getElementById(viewId).style.display = 'block';
        }

        // --- 1. FITUR INTERAKTIF: LIVE SEARCH & DROPDOWN REKOMENDASI ---
        function handlePencarianPinjam() {
            let input = document.getElementById("kolomCariPinjam").value.toLowerCase();
            let kotakBox = document.getElementById("rekomendasiPinjam");
            
            if (input === "") {
                kotakBox.style.display = "none";
                tampilkanKeTabelPinjam(dataPinjamLokal); 
                return;
            }

            kotakBox.innerHTML = ""; 
            let setSaran = new Set(); // Menggunakan nama simpel 'setSaran'

            // Buat rekomendasi berdasarkan ID Pinjam, Nama Peminjam, atau Judul Buku
            dataPinjamLokal.forEach(p => {
                if (p.id_peminjaman.toLowerCase().includes(input)) setSaran.add(p.id_peminjaman);
                if (p.peminjam.toLowerCase().includes(input)) setSaran.add(p.peminjam);
                if (p.judul_buku.toLowerCase().includes(input)) setSaran.add(p.judul_buku);
            });

            if (setSaran.size > 0) {
                kotakBox.style.display = "block";
                setSaran.forEach(saran => {
                    let item = document.createElement("div");
                    item.innerText = saran;
                    item.style.padding = "10px 15px";
                    item.style.cursor = "pointer";
                    item.style.fontSize = "13px";
                    item.style.color = "#333";
                    item.style.borderBottom = "1px solid #eee";
                    
                    item.onmouseover = function() { this.style.background = "#f0f0f0"; };
                    item.onmouseout = function() { this.style.background = "white"; };
                    
                    item.onclick = function() {
                        document.getElementById("kolomCariPinjam").value = saran;
                        kotakBox.style.display = "none";
                        saringTabelPinjam(saran.toLowerCase());
                    };
                    kotakBox.appendChild(item);
                });
            } else {
                kotakBox.style.display = "none";
            }

            saringTabelPinjam(input);
        }

        // Fungsi pembantu untuk menyaring baris fisik tabel secara instan
        function saringTabelPinjam(kataKunci) {
            let tbody = document.getElementById('tabelPinjamBody');
            let tr = tbody.getElementsByTagName("tr");

            for (let i = 0; i < tr.length; i++) {
                let teksBaris = tr[i].innerText.toLowerCase();
                if (teksBaris.includes(kataKunci)) {
                    tr[i].style.display = ""; 
                } else {
                    tr[i].style.display = "none"; 
                }
            }
        }

        // --- 2. GET: MENGAMBIL DATA DARI DATABASE ---
        async function loadDataPeminjaman() {
            try {
                const response = await fetch(API_URL);
                dataPinjamLokal = await response.json(); // Simpan ke variabel global
                tampilkanKeTabelPinjam(dataPinjamLokal);
            } catch (error) { 
                console.error('Error fetching data:', error); 
            }
        }

        // Fungsi merender data array ke elemen tabel HTML
        function tampilkanKeTabelPinjam(daftarPinjam) {
            let tbody = document.getElementById('tabelPinjamBody');
            tbody.innerHTML = ''; 
            daftarPinjam.forEach((pinjam, index) => {
                tbody.innerHTML += `<tr>
                    <td>${index + 1}</td>
                    <td>${pinjam.id_peminjaman}</td>
                    <td>${pinjam.judul_buku}</td>
                    <td>${pinjam.peminjam}</td>
                    <td>${pinjam.tanggal_peminjaman}</td>
                    <td>${pinjam.jatuh_tempo}</td>
                    <td>
                        <button class="btn-action btn-edit" onclick="editData('${pinjam.id_peminjaman}', '${pinjam.judul_buku}', '${pinjam.peminjam}', '${pinjam.tanggal_peminjaman}', '${pinjam.jatuh_tempo}')">✏️</button>
                        <button class="btn-action btn-delete" onclick="hapusData('${pinjam.id_peminjaman}')">🗑️</button>
                    </td>
                </tr>`;
            });
        }

        // --- 3. TAMBAH DATA ---
        function tambahData() {
            isEditMode = false;
            document.getElementById('formTitle').innerText = "TAMBAH PEMINJAMAN";
            document.getElementById('inIdPinjam').value = '';
            document.getElementById('inIdPinjam').disabled = false;
            document.getElementById('inJudulBuku').value = '';
            document.getElementById('inPeminjam').value = '';
            document.getElementById('inTgl').value = '';
            document.getElementById('inJatuhTempo').value = '';
            toggleView('viewForm');
        }

        // --- 4. EDIT DATA ---
        function editData(id, judul, peminjam, tgl, tempo) {
            isEditMode = true;
            document.getElementById('formTitle').innerText = "EDIT PEMINJAMAN";
            document.getElementById('inIdPinjam').value = id;
            document.getElementById('inIdPinjam').disabled = true;
            document.getElementById('inJudulBuku').value = judul;
            document.getElementById('inPeminjam').value = peminjam;
            document.getElementById('inTgl').value = tgl;
            document.getElementById('inJatuhTempo').value = tempo;
            toggleView('viewForm');
        }

        // --- 5. POST / PUT: MENYIMPAN DATA ---
        async function simpanData() {
            const payload = {
                id_peminjaman: document.getElementById('inIdPinjam').value,
                judul_buku: document.getElementById('inJudulBuku').value,
                peminjam: document.getElementById('inPeminjam').value,
                tanggal_peminjaman: document.getElementById('inTgl').value,
                jatuh_tempo: document.getElementById('inJatuhTempo').value
            };

            if (!payload.id_peminjaman) { alert("ID Peminjaman harus diisi!"); return; }

            const url = isEditMode ? `${API_URL}/${payload.id_peminjaman}` : API_URL;
            const method = isEditMode ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if(res.ok) { 
                    alert("Data berhasil disimpan!"); 
                    toggleView('viewTabel'); 
                    loadDataPeminjaman(); 
                } else { 
                    alert("Gagal menyimpan. ID mungkin sudah dipakai."); 
                }
            } catch (error) { alert("Error: " + error.message); }
        }

        // --- 6. DELETE: HAPUS DATA ---
        async function hapusData(id) {
            if(confirm(`Hapus Peminjaman ID: ${id}?`)) {
                try {
                    const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    if(res.ok) { alert("Berhasil dihapus!"); loadDataPeminjaman(); }
                } catch (error) { console.error(error); }
            }
        }

        // ==========================================
        // SISTEM PROTEKSI HALAMAN & NAMA ADMIN
        // ==========================================
        document.addEventListener("DOMContentLoaded", function() {
            let adminAktif = localStorage.getItem("namaAdminAktif");

            if (!adminAktif) {
                alert("Akses Ilegal! Anda harus Login terlebih dahulu.");
                window.location.href = "admin_login.html"; 
            } else {
                document.getElementById("namaAdminTampil").innerText = adminAktif;
            }
        });

        function prosesLogout() {
            localStorage.removeItem("namaAdminAktif");
            window.location.href = "admin_login.html";
        }
    </script>
</body>
</html>
