<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
    <link rel="stylesheet" href="admin_style.css">
    <style>
        /* ==================== INTEGRASI LAYOUT FLEXBOX MODERN ==================== */
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #D3D3D3;
            font-family: 'Poppins', sans-serif;
        }

        /* Wadah besar pembungkus halaman (Sidebar + Konten Utama) */
        .dashboard-container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* Pengaturan transisi animasi smooth untuk Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #1A1152; /* Menyesuaikan warna tema ungu gelap utama */
            transition: all 0.3s ease;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        /* Pengaturan transisi animasi smooth untuk Konten Kanan */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        /* Area bar navigasi atas tempat tombol hamburger berada */
        .top-navbar {
            background-color: #1A1152;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            color: white;
        }

        #hamburgerBtn {
            cursor: pointer;
            font-size: 24px;
            user-select: none;
        }

        /* Wadah khusus area isi halaman (Dashboard judul & Kotak Kartu) */
        .content-body {
            padding: 30px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .page-title {
            text-align: center;
            color: #1A1152;
            font-weight: 700;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        /* ==================== SAKLAR TOGGLE ANIMASI SIDEBAR ==================== */
        .sidebar.collapsed {
            width: 0;
            min-width: 0;
            overflow: hidden;
        }

        /* ==================== GAYA KARTU EMAS/WARNA ASLI KAMU ==================== */
        .dashboard-cards { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            flex-wrap: wrap; 
            margin-top: 40px;
        }
        
        .dash-card { 
            width: 300px; 
            height: 180px; 
            border-radius: 15px; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
            text-decoration: none;
            transition: transform 0.2s ease-in-out;
        }

        .dash-card:hover {
            transform: translateY(-5px); /* Efek melayang sedikit saat mouse di atas kartu */
        }
        
        .card-body { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 24px; 
            font-weight: bold; 
            gap: 10px;
        }
        
        .card-footer { 
            background-color: rgba(0,0,0,0.2); 
            text-align: center; 
            padding: 10px; 
            font-size: 12px;
        }
        
        .card-buku { background-color: #1A0D6B; }
        .card-anggota { background-color: #721C24; }
        .card-pinjam { background-color: #155724; }
    </style>
</head>
<body>

    <div class="dashboard-container">

        <div class="sidebar" id="sidebar">
            <div class="profile-section">
                <div class="profile-icon">👤</div>
                <div id="namaAdminTampil" style="font-weight: bold; font-size: 18px; text-transform: uppercase;">PERSON</div>
                <div class="role-badge">Administrator</div>
            </div>
            
            <ul class="menu">
                <a href="admin_dashboard.html" class="active">📊 Dashboard</a>
                <a href="admin_buku.html">📖 Kelola Data</a>
                <a href="admin_anggota.html">👥 Log Data</a>
                <a href="admin_peminjaman.html">📄 Laporan</a>
            </ul>
            
            <a href="#" onclick="prosesLogout()" class="logout">🚪 Log Out</a>
        </div>

        <div class="main-content" id="mainContent">
            
            <div class="top-navbar">
                <span id="hamburgerBtn" onclick="toggleSidebar()">☰</span>
            </div>
            
            <div class="content-body">
                <h2 class="page-title">DASHBOARD</h2>
                
                <div class="dashboard-cards">
                    <a href="admin_buku.html" class="dash-card card-buku">
                        <div class="card-body">📖 BUKU</div>
                        <div class="card-footer">More Information ➔</div>
                    </a>
                    
                    <a href="admin_anggota.html" class="dash-card card-anggota">
                        <div class="card-body">👤+ ANGGOTA</div>
                        <div class="card-footer">More Information ➔</div>
                    </a>
                    
                    <a href="admin_peminjaman.html" class="dash-card card-pinjam">
                        <div class="card-body">📄 PEMINJAMAN</div>
                        <div class="card-footer">More Information ➔</div>
                    </a>
                </div>
            </div>

        </div>

    </div>

    <script>
        // SISTEM PROTEKSI HALAMAN & NAMA ADMIN
        document.addEventListener("DOMContentLoaded", function() {
            let adminAktif = localStorage.getItem("namaAdminAktif");

            if (!adminAktif) {
                alert("Akses Ilegal! Anda harus Login terlebih dahulu.");
                window.location.href = "admin_login.html";
            } else {
                document.getElementById("namaAdminTampil").innerText = adminAktif;
            }
        });

        // FUNGSI LOGOUT
        function prosesLogout() {
            localStorage.removeItem("namaAdminAktif");
            window.location.href = "admin_login.html";
        }

        // FUNGSI TOGGLE SIDEBAR (EFEKTIF & RINGAN)
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            // Cukup manipulasi class sidebar saja, konten kanan otomatis melebar sendiri
            sidebar.classList.toggle('collapsed');
        }
    </script>
</body>
</html>
