<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - Perpustakaan Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS Dasar */
        :root { --bg-main: #F0F0F0; --purple-dark: #1E1450; --text-dark: #333; }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background-color: var(--bg-main); display: flex; flex-direction: column; min-height: 100vh; }
        .navbar { background-color: var(--purple-dark); color: white; display: flex; align-items: center; padding: 15px 30px; margin: 10px; border-radius: 15px; gap: 30px; }
        .navbar .logo { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .nav-links { display: flex; gap: 20px; flex-grow: 1; }
        .nav-links a { color: #aaa; text-decoration: none; font-size: 16px; font-weight: 600; transition: 0.3s; }
        .nav-links a.active { color: white; font-weight: bold; } 
        .user-icon { background: white; color: var(--purple-dark); width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        .container { padding: 20px 40px; flex-grow: 1; }
        .tentang-kami { background-color: var(--purple-dark); height: 250px; border-radius: 20px; padding: 20px; color: white; margin-bottom: 20px; }
        
        /* Swiper Engine Custom Card */
        .swiper { width: 100%; padding-top: 20px; padding-bottom: 20px; }
        
        /* PENGUNCIAN UKURAN KARTU BUKU ANTI MELAR */
        .swiper-slide { 
            position: relative !important; 
            width: 200px !important; 
            height: 300px !important; 
            border-radius: 24px !important; 
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3) !important; 
            overflow: hidden !important; 
            background-color: #ddd;
        }
        .swiper-slide img { display: block; width: 100% !important; height: 100% !important; object-fit: cover !important; border-radius: 24px !important; }
        .swiper-button-next, .swiper-button-prev { color: var(--purple-dark); }
        
        /* ==========================================================================
           PERBAIKAN TOTAL: OVERLAY GRADASI vignette DI DALAM KARTU (ANTI-BENTROK)
           ========================================================================== */
        .slider-overlay {
            position: absolute !important;
            bottom: 0 !important;
            left: 0 !important;
            width: 100% !important;
            padding: 40px 15px 20px 15px !important;
            box-sizing: border-box !important;
            /* Membuat gradasi gelap yang mulus dari bawah ke tengah */
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.5) 60%, transparent 100%) !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: flex-end !important;
            align-items: flex-start !important;
            text-align: left !important;
            z-index: 10 !important;
            
            /* Sembunyikan bawaan untuk kartu sampingan */
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.4s ease, transform 0.4s ease !important;
        }

        /* Tampilkan overlay teks hanya untuk kartu yang sedang tepat di tengah (Center) */
        .swiper-slide-active .slider-overlay {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .overlay-title { 
            color: #ffffff !important; 
            font-size: 16px !important; 
            font-weight: 700 !important; 
            line-height: 1.2 !important;
            margin: 0 !important;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6) !important;
        }
        
        .overlay-author { 
            color: rgba(255, 255, 255, 0.85) !important; 
            font-size: 12px !important; 
            font-weight: 400 !important;
            margin: 4px 0 0 0 !important;
        }

        /* ==========================================================================
           GAYA INDIKATOR TITIK / PIL ORANYE RESPONSIF
           ========================================================================== */
        .carousel-dots-container { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 8px; 
            margin-top: 30px; 
            margin-bottom: 20px; 
        }
        .dot { width: 10px; height: 10px; background-color: #ccc; border-radius: 50%; cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .dot.active { width: 32px; height: 10px; background-color: #FF9800; border-radius: 5px; box-shadow: 0 2px 6px rgba(255, 152, 0, 0.4); }

        footer { background-color: var(--purple-dark); color: white; padding: 40px; margin-top: auto; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">📖 Perpustakaan Digital</div>
        <div class="nav-links">
            <a href="beranda.html" class="active">Beranda</a>
            <a href="koleksi.html">Koleksi</a>
        </div>
        <div class="user-icon">👤</div>
    </nav>

    <div class="container">
        <div class="tentang-kami">
            <h2>Tentang Kami</h2>
        </div>

        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="swiperWrapperBuku">
                </div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>

        <div class="carousel-dots-container" id="carouselDots"></div>
    </div>

    <footer>
        <div>
            <h4>📖 Perpustakaan Digital</h4>
            <p>📍 Location</p>
            <p>📞 Phone Number</p>
        </div>
        <div style="display: flex; gap: 15px; align-items: center; position: relative; z-index: 9999; pointer-events: auto;">
            <a href="https://www.instagram.com/username_kamu" target="_blank" style="color: white; text-decoration: none; font-size: 24px; transition: 0.3s; display: inline-block; cursor: pointer;">
                <i class="fab fa-instagram"></i>
            </a> 
            <a href="https://youtube.com/@nadiahidayatullah5863?si=4iEeLkSxTdT-pxcO" target="_blank" style="color: white; text-decoration: none; font-size: 24px; transition: 0.3s; display: inline-block; cursor: pointer;">
                <i class="fab fa-youtube"></i>
            </a> 
            <a href="mailto:perpusdigital@gmail.com" style="color: white; text-decoration: none; display: flex; align-items: center; gap: 8px; font-family: 'Poppins', sans-serif; transition: 0.3s; cursor: pointer;">
                <i class="far fa-envelope" style="font-size: 24px;"></i>
                <span style="font-size: 14px; font-weight: 600;">perpusdigital@gmail.com</span>
            </a>
        </div>  
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        let daftarBukuBeranda = [];
        let indeksAktif = 0; 
        let swiperInstance;

        // 1. Ambil Data Buku dari API Database Python
        async function loadBukuCarousel() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/buku');
                daftarBukuBeranda = await response.json();
                
                if(daftarBukuBeranda.length > 0) {
                    renderSlidesBuku();
                    generateDots();
                    initSwiperEngine();
                }
            } catch (error) {
                console.error("Gagal memuat data buku untuk carousel:", error);
            }
        }

        // 2. Cetak Kartu Buku ke DOM secara Dinamis
        function renderSlidesBuku() {
            const wrapper = document.getElementById('swiperWrapperBuku');
            wrapper.innerHTML = '';

            daftarBukuBeranda.forEach((buku) => {
                let fotoUrl = `http://127.0.0.1:8000/static/img/${buku.id_buku}.jpg`;
                let slideHtml = `
                <div class="swiper-slide">
                    <img src="${fotoUrl}" onerror="this.src='https://via.placeholder.com/200x300/1E1450/FFFFFF?text=${buku.judul}'">
                    <div class="slider-overlay">
                        <div class="overlay-title">${buku.judul}</div>
                        <div class="overlay-author">${buku.pengarang}</div>
                    </div>
                </div>`;
                wrapper.innerHTML += slideHtml;
            });
        }

        // 3. Bangun Sistem Bullet Tracker di Bawah Slider
        function generateDots() {
            const dotsContainer = document.getElementById('carouselDots');
            dotsContainer.innerHTML = ''; 
            
            daftarBukuBeranda.forEach((buku, index) => {
                let dot = document.createElement('div');
                dot.className = `dot ${index === indeksAktif ? 'active' : ''}`;
                
                dot.onclick = () => {
                    if(swiperInstance) swiperInstance.slideTo(index);
                };
                dotsContainer.appendChild(dot);
            });
        }

        // 4. Jalankan Swiper Engine & Kaitkan Sinkronisasi Slide
        function initSwiperEngine() {
            swiperInstance = new Swiper(".mySwiper", {
                effect: "coverflow", 
                grabCursor: true, 
                centeredSlides: true, 
                slidesPerView: "auto", 
                initialSlide: 4,
                coverflowEffect: { rotate: 0, stretch: 40, depth: 140, modifier: 1, slideShadows: true },
                navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
                observer: true,
                observeParents: true,
                on: {
                    slideChange: function () {
                        indeksAktif = this.activeIndex;
                        updateCarouselDisplay();
                    }
                }
            });
            updateCarouselDisplay();
        }

        // 5. Update Status Aktif Dot Menjadi Garis Pil Oranye Panjang
        function updateCarouselDisplay() {
            if (daftarBukuBeranda.length === 0) return;

            const seluruhTitik = document.querySelectorAll('.dot');
            seluruhTitik.forEach((dot, index) => {
                if(index === indeksAktif) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        window.addEventListener('DOMContentLoaded', loadBukuCarousel);
    </script>
</body>
</html>
